name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Build + tests sur les 3 OS cibles
  # ---------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}

      # Slint + winit + ksni + notify-rust : besoins X11/Wayland/dbus/fontconfig/GL
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libxcb1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-randr0-dev \
            libxcb-render0-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxi-dev \
            libxrandr-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libdbus-1-dev

      - name: Cargo fmt --check
        run: cargo fmt --all -- --check

      # Build d'abord pour s'assurer que les build scripts Slint génèrent
      # bien le code (sinon clippy reporte des "type not found" trompeurs).
      - name: Cargo build
        run: cargo build --workspace --all-targets

      - name: Cargo test
        run: cargo test --workspace --all-targets

      # Clippy strict uniquement sur Linux (notre plateforme de référence).
      # Sur macOS/Windows on se contente de la compilation + tests passants.
      - name: Cargo clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Release : déclenchée uniquement sur les tags v*. Build le binaire en
  # release sur chaque OS et l'attache comme asset à la GitHub Release
  # automatiquement créée par le tag.
  # ---------------------------------------------------------------------------
  release:
    name: Release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: clawagentmonitor-linux-x86_64
            ext: ""
          - os: macos-latest
            asset: clawagentmonitor-macos-aarch64
            ext: ""
          - os: windows-latest
            asset: clawagentmonitor-windows-x86_64.exe
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.os }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libfontconfig1-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-randr0-dev libxcb-render0-dev libxcursor-dev libxinerama-dev \
            libxi-dev libxrandr-dev libgl1-mesa-dev libegl1-mesa-dev \
            libgles2-mesa-dev libdbus-1-dev

      - name: Build release binary
        run: cargo build --release -p clawagentmonitor

      - name: Rename binary
        shell: bash
        run: |
          mv "target/release/clawagentmonitor${{ matrix.ext }}" "${{ matrix.asset }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true
