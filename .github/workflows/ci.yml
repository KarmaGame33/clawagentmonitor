name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Build + tests sur Linux (seule plateforme cible pour l'instant).
  # macOS/Windows seront ajoutés plus tard quand le projet sera stabilisé.
  # ---------------------------------------------------------------------------
  test:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      # Slint + winit + ksni + notify-rust : besoins X11/Wayland/dbus/fontconfig/GL
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libfontconfig1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libxcb1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-randr0-dev \
            libxcb-render0-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxi-dev \
            libxrandr-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libdbus-1-dev

      - name: Cargo fmt --check
        run: cargo fmt --all -- --check

      - name: Cargo build
        run: cargo build --workspace --all-targets

      - name: Cargo test
        run: cargo test --workspace --all-targets

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Release : déclenchée uniquement sur les tags v*. Build le binaire en
  # release et l'attache comme asset à la GitHub Release automatiquement
  # créée par le tag.
  # ---------------------------------------------------------------------------
  release:
    name: Release (ubuntu-latest)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libfontconfig1-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-randr0-dev libxcb-render0-dev libxcursor-dev libxinerama-dev \
            libxi-dev libxrandr-dev libgl1-mesa-dev libegl1-mesa-dev \
            libgles2-mesa-dev libdbus-1-dev

      - name: Build release binary
        run: cargo build --release -p clawagentmonitor

      - name: Rename binary
        run: mv target/release/clawagentmonitor clawagentmonitor-linux-x86_64

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: clawagentmonitor-linux-x86_64
          fail_on_unmatched_files: true
